name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Shared packages must be built before tests can import from them
      - name: Build shared packages
        run: |
          npm run build --workspace=packages/schemas
          npm run build --workspace=packages/types

      - name: Test — schemas (55 tests)
        run: npm run test --workspace=packages/schemas

      - name: Test — api (55 tests)
        run: npm run test --workspace=apps/api

      - name: Test — web (22 tests)
        run: npm run test --workspace=apps/web
