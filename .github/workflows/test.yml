name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # turbo.json defines test as depending on ^build, so shared packages
      # (schemas, types) are built automatically before tests run.
      - name: Test
        run: npm run test
